name: Build and Deploy
on:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch latest broadcast data
        run: |
          git fetch origin gh-pages
          git checkout origin/gh-pages -- broadcasts.json && mv broadcasts.json static/ || true
          git checkout origin/gh-pages -- league_order.json && mv league_order.json static/ || true

      - name: Install and Build
        run: |
          npm install
          npm run build
          ls -a

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build